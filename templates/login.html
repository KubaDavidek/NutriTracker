{% extends "base.html" %}
{% block title %}Přihlášení – NutriTracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">
          <i class="bi bi-person-lock text-success"></i> Přihlášení
        </h4>

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="vas@email.cz" required autofocus/>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Heslo</label>
            <input type="password" class="form-control" id="password"
                   name="password" required/>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="bi bi-box-arrow-in-right"></i> Přihlásit se
            </button>
          </div>
        </form>

        <hr/>
        <p class="text-center mb-0">
          Nemáš účet?
          <a href="{{ url_for('auth.register') }}">Zaregistruj se</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
